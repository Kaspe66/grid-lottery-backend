  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">

</head>
<body>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <script>
    let tonConnectUI = null;
    
    window.initTonConnect = function() {
      if (!tonConnectUI) {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://grid-lottery-game.web.app/tonconnect-manifest.json'
        });
      }
    };

    window.sendTonTransaction = async function(address, amountNanoStr, memo) {
      if (!tonConnectUI) {
        window.initTonConnect();
      }
      
      // Проверяем, подключен ли кошелек
      if (!tonConnectUI.connected) {
          try {
              await tonConnectUI.openModal();
          } catch(e) {
              console.error(e);
              return false;
          }
      }
      // Ждем, пока пользователь подключит кошелек в модалке (может занять время)
      // В TON Connect UI openModal() просто открывает окно, но не ждет завершения.
      // Поэтому мы подписываемся на изменение статуса, если кошелек не подключен.
      // Для упрощения: если после await openModal кошелек еще не подключен, выкидываем ошибку (пользователь закрыл окно).
      // На самом деле openModal() это Promise, который резолвится когда окно закрывается.
      // Но лучше просто проверить .connected после.
      if (!tonConnectUI.connected) {
         console.log("Wallet not connected");
         return false; 
      }
      
      // Формируем payload для текстового комментария
      // В TON комментарий начинается с 4 нулей (0x00000000), дальше идет сам текст
      // Для простоты мы можем отправить пустой payload, так как бэкенд ищет перевод по сумме/адресу
      // НО нам нужен memo. По спецификации TON, текстовый комментарий кодируется так:
      // Чтобы не тащить библиотеку ton-core, мы можем использовать готовую структуру или просто отправлять
      // Но TON Connect UI требует base64 payload.
      // Для Telegram Mini Apps проще сделать так:
      // Переводим текст в Uint8Array, добавляем 4 нуля в начало.
      const encoder = new TextEncoder();
      const textBytes = encoder.encode(memo);
      const payloadBytes = new Uint8Array(4 + textBytes.length);
      payloadBytes.set([0, 0, 0, 0], 0);
      payloadBytes.set(textBytes, 4);
      
      // Конвертируем Uint8Array в base64
      let binary = '';
      for (let i = 0; i < payloadBytes.length; i++) {
          binary += String.fromCharCode(payloadBytes[i]);
      }
      const payloadBase64 = btoa(binary);

      const transaction = {
          validUntil: Math.floor(Date.now() / 1000) + 360,
          messages: [
              {
                  address: address,
                  amount: amountNanoStr,
                  payload: payloadBase64
              }
          ]
      };

      try {
          const result = await tonConnectUI.sendTransaction(transaction);
          return true;
      } catch (e) {
          console.error(e);
          return false;
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
