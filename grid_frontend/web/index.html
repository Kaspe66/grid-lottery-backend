<!DOCTYPE html>
<html>
<head>
  <!--

    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="grid_frontend">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>grid_frontend</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <script src="https://unpkg.com/tonweb@0.0.60/dist/tonweb.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <script>
    let tonConnectUI = null;
    
    window.initTonConnect = function() {
      if (!tonConnectUI) {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://grid-lottery-game.web.app/tonconnect-manifest.json'
        });
      }
    };

    window.getConnectedWallet = function() {
      if (tonConnectUI && tonConnectUI.connected) {
          return tonConnectUI.account.address;
      }
      return null;
    };

    window.disconnectWallet = async function() {
      if (tonConnectUI && tonConnectUI.connected) {
          await tonConnectUI.disconnect();
      }
    };

    window.sendTonTransaction = async function(address, amountNanoStr, memo) {
      if (!tonConnectUI) {
        window.initTonConnect();
      }
      
      // Проверяем, подключен ли кошелек
      if (!tonConnectUI.connected) {
          try {
              await tonConnectUI.openModal();
          } catch(e) {
              alert("Ошибка открытия кошелька: " + (e.message || e));
              console.error(e);
              return false;
          }
      }
      
      if (!tonConnectUI.connected) {
         console.log("Wallet not connected");
         return false; 
      }
      
      // Формируем payload для текстового комментария
      // В TON комментарий начинается с 4 нулей (0x00000000), дальше идет сам текст
      // Для простоты мы можем отправить пустой payload, так как бэкенд ищет перевод по сумме/адресу
      // НО нам нужен memo. По спецификации TON, текстовый комментарий кодируется так:
      // Чтобы не тащить библиотеку ton-core, мы можем использовать готовую структуру или просто отправлять
      // Но TON Connect UI требует base64 payload.
      // Для Telegram Mini Apps проще сделать так:
      // Переводим текст в Uint8Array, добавляем 4 нуля в начало.
      // В TON текстовый комментарий начинается с 32-битного нуля (0x00000000)
      // Мы используем библиотеку TonWeb для правильного кодирования BOC
      let payloadBase64 = '';
      try {
          const cell = new window.TonWeb.boc.Cell();
          cell.bits.writeUint(0, 32);
          cell.bits.writeString(memo);
          const bocBytes = await cell.toBoc();
          payloadBase64 = window.TonWeb.utils.bytesToBase64(bocBytes);
      } catch (e) {
          console.error("Payload error", e);
          alert("Ошибка формирования комментария");
          return false;
      }

      const transaction = {
          validUntil: Math.floor(Date.now() / 1000) + 360,
          messages: [
              {
                  address: address,
                  amount: amountNanoStr,
                  payload: payloadBase64
              }
          ]
      };

      try {
          const result = await tonConnectUI.sendTransaction(transaction);
          return true;
      } catch (e) {
          alert("Ошибка транзакции: " + (e.message || e));
          console.error(e);
          return false;
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
